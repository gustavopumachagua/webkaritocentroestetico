    <script>
      (function () {
        var locale = "es";

        try {
          locale =
            window.localStorage.getItem("karito-locale") === "en" ? "en" : "es";
        } catch (error) {
          locale = "es";
        }

        var contentByLocale = {
          es: {
            lang: "es-PE",
            title:
              "Karito Centro Estético | Medicina Estética Facial y Corporal en Los Olivos",
            description:
              "Karito Centro Estético ofrece limpiezas faciales, tratamientos faciales y corporales con atención personalizada, tecnología moderna y resultados visibles en Los Olivos, Lima.",
            keywords:
              "Karito Centro Estético, centro estético, medicina estética, limpiezas faciales, tratamientos faciales, tratamientos corporales, Los Olivos, Lima",
            author: "Karito Centro Estético",
            applicationName: "Karito Centro Estético",
            siteName: "Karito Centro Estético",
            ogLocale: "es_PE",
            imageAlt:
              "Karito Centro Estético, medicina estética facial y corporal",
          },
          en: {
            lang: "en",
            title:
              "Karito Aesthetic Center | Facial and Body Aesthetic Medicine in Los Olivos",
            description:
              "Karito Aesthetic Center offers facial cleanses, facial treatments, and body treatments with personalized care, modern technology, and visible results in Los Olivos, Lima.",
            keywords:
              "Karito Aesthetic Center, aesthetic center, aesthetic medicine, facial cleanses, facial treatments, body treatments, Los Olivos, Lima",
            author: "Karito Aesthetic Center",
            applicationName: "Karito Aesthetic Center",
            siteName: "Karito Aesthetic Center",
            ogLocale: "en_US",
            imageAlt:
              "Karito Aesthetic Center, facial and body aesthetic medicine",
          },
        };
        var currentContent = contentByLocale[locale] || contentByLocale.es;

        function setMeta(selector, content) {
          var element = document.querySelector(selector);

          if (element && content) {
            element.setAttribute("content", content);
          }
        }

        document.documentElement.lang = currentContent.lang;
        document.title = currentContent.title;
        setMeta('meta[name="description"]', currentContent.description);
        setMeta('meta[name="keywords"]', currentContent.keywords);
        setMeta('meta[name="author"]', currentContent.author);
        setMeta(
          'meta[name="application-name"]',
          currentContent.applicationName,
        );
        setMeta('meta[property="og:locale"]', currentContent.ogLocale);
        setMeta('meta[property="og:site_name"]', currentContent.siteName);
        setMeta('meta[property="og:title"]', currentContent.title);
        setMeta('meta[property="og:description"]', currentContent.description);
        setMeta('meta[property="og:image:alt"]', currentContent.imageAlt);
        setMeta('meta[name="twitter:title"]', currentContent.title);
        setMeta('meta[name="twitter:description"]', currentContent.description);
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        background: #05070a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(207, 155, 114, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at 82% 12%,
            rgba(114, 141, 175, 0.1),
            transparent 20%
          ),
          radial-gradient(
            circle at center right,
            rgba(155, 102, 71, 0.12),
            transparent 22%
          ),
          linear-gradient(180deg, #05070a 0%, #091019 42%, #0b131c 100%);
        color: #f6efe8;
      }

      #root {
        min-height: 100vh;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top left,
            rgba(207, 155, 114, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at 82% 12%,
            rgba(114, 141, 175, 0.1),
            transparent 20%
          ),
          radial-gradient(
            circle at center right,
            rgba(155, 102, 71, 0.12),
            transparent 22%
          ),
          linear-gradient(180deg, #05070a 0%, #091019 42%, #0b131c 100%);
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }

      body.app-ready #boot-loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-loader__shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
      }

      .boot-loader__mark {
        display: grid;
        place-items: center;
        width: 104px;
        height: 104px;
        padding: 12px;
        border-radius: 28px;
        border: 1px solid rgba(242, 231, 219, 0.1);
        background: rgba(12, 18, 27, 0.82);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(12px);
      }

      .boot-loader__mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 22px;
      }

      .boot-loader__spinner {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 3px solid rgba(242, 231, 219, 0.12);
        border-top-color: #cf9b72;
        animation: boot-spin 0.9s linear infinite;
      }

      .boot-loader__label {
        margin: 0;
        font-family: "Fraunces", Georgia, serif;
        font-size: 1.5rem;
        line-height: 1;
        letter-spacing: 0.01em;
        color: #f2ceb0;
      }

      .boot-loader__label::before {
        content: attr(data-es);
      }

      html[lang="en"] .boot-loader__label::before {
        content: attr(data-en);
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-hidden="true">
      <div class="boot-loader__shell">
        <div class="boot-loader__mark">
          <img src="/apple-touch-icon.png" alt="" />
        </div>
        <div class="boot-loader__spinner"></div>
        <p
          class="boot-loader__label"
          data-es="Karito Centro Estético"
          data-en="Karito Aesthetic Center"
        ></p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
